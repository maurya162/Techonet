{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
     background:linear-gradient(to right, #f7ecce, #8fd9f7);

     font-family:Arial;

     margin:0;
     padding:0;
}

/* TOP BAR */

.top-bar{
    width:90%;
    margin:30px auto 0;

    display:flex;
    justify-content:flex-end;
}

/* BACK BUTTON */

.back-btn{
    padding:12px 25px;

    background:#2563eb;

    color:white;

    text-decoration:none;

    border-radius:8px;

    font-size:16px;

    font-weight:bold;

    transition:0.3s;
}

.back-btn:hover{
    background:#1d4ed8;

    transform:translateY(-2px);
}

/* FORM */

.form-container{

    width:400px;

    background:white;

    padding:40px;

    margin:30px auto 80px;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.form-container h2{

    text-align:center;

    margin-bottom:25px;

    color:#0f172a;

    font-size:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group input{

    width:100%;

    padding:14px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

    box-sizing:border-box;

    outline:none;

    transition:0.3s;
}

.form-group input:focus{

    border-color:#2563eb;

    box-shadow:0 0 5px rgba(37,99,235,0.3);
}

/* BUTTON */

.submit-btn{

    width:100%;

    padding:14px;

    background:#2563eb;

    color:white;

    border:none;

    border-radius:8px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.submit-btn:hover{

    background:#1d4ed8;

    transform:translateY(-2px);
}

/* ERROR */

.error{

    color:red;

    text-align:center;

    margin-bottom:15px;
}

/* LINK */

.link{

    text-align:center;

    margin-top:20px;

    font-size:16px;
}

.link a{

    text-decoration:none;

    color:#2563eb;

    font-weight:bold;
}

.link a:hover{
    text-decoration:underline;
}
/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:768px){

    *{
        box-sizing:border-box;
    }

    body{

        padding:15px;

        display:flex;

        flex-direction:column;

        align-items:center;

        overflow-x:hidden;
    }

    /* TOP BAR */

    .top-bar{

        width:100%;

        margin:15px 0;

        display:flex;

        justify-content:center;
    }

    /* BACK BUTTON */

    .back-btn{

        width:160px;

        text-align:center;

        padding:12px 18px;

        font-size:15px;
    }

    /* FORM CONTAINER */

    .form-container{

        width:100%;

        max-width:420px;

        padding:30px 22px;

        margin:10px auto 40px;

        border-radius:16px;

        box-sizing:border-box;
    }

    /* TITLE */

    .form-container h2{

        font-size:30px;

        margin-bottom:22px;

        line-height:1.3;
    }

    /* FORM GROUP */

    .form-group{

        margin-bottom:18px;
    }

    /* INPUTS */

    .form-group input{

        width:100%;

        padding:14px;

        font-size:15px;
    }

    /* BUTTON */

    .submit-btn{

        width:100%;

        padding:14px;

        font-size:17px;
    }

    /* LINK */

    .link{

        font-size:15px;

        line-height:1.6;

        text-align:center;
    }
}

/* EXTRA SMALL DEVICES */

@media(max-width:480px){

    body{

        padding:12px;
    }

    .form-container{

        padding:25px 18px;
    }

    .form-container h2{

        font-size:26px;
    }

    .form-group input{

        font-size:14px;

        padding:13px;
    }

    .submit-btn{

        font-size:16px;
    }

    .back-btn{

        width:140px;

        font-size:14px;
    }

    .link{

        font-size:14px;
    }
}

</style>

</head>
<body>

<!-- TOP BAR -->

<div class="top-bar">

    <a href="/"
       class="back-btn">

        Back

    </a>

</div>

<!-- REGISTER FORM -->

<div class="form-container">

    <h2>Create Account</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

        </div>

        <div class="form-group">

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

        </div>

        <div class="form-group">

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

        </div>

        <button type="submit"
                class="submit-btn">

            Register

        </button>

    </form>

    <div class="link">

        Already have account?

        <a href="{% url 'login' %}">
            Login
        </a>

    </div>

</div>

</body>
</html>
