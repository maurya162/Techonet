{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Claim Item</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:linear-gradient(
        to right,
        #f7ecce,
        #8fd9f7
    );

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial;

    padding:20px;
}

/* BACK BUTTON */

.back-btn{

    position:absolute;

    top:25px;

    right:25px;

    padding:12px 22px;

    background:#2563eb;

    color:white;

    text-decoration:none;

    border-radius:10px;

    font-size:15px;

    font-weight:bold;

    transition:0.3s;
}

.back-btn:hover{

    background:#1d4ed8;

    transform:translateY(-2px);
}

/* MOBILE */

@media(max-width:768px){

    .back-btn{

        top:15px;

        right:15px;

        padding:10px 18px;

        font-size:14px;
    }
}

.form-box{

    width:100%;

    max-width:450px;

    background:white;

    padding:35px;

    border-radius:20px;

    box-shadow:
    0 10px 25px rgba(0,0,0,0.12);
}

.form-box h1{

    text-align:center;

    margin-bottom:25px;

    color:#0f172a;
}

input,
textarea{

    width:100%;

    padding:14px;

    margin-bottom:18px;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:16px;

    outline:none;
}

textarea{

    resize:none;
}

button{

    width:100%;

    padding:14px;

    background:#10b981;

    color:white;

    border:none;

    border-radius:10px;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:#059669;
}

@media(max-width:480px){

    .form-box{

        padding:25px 18px;
    }

    .form-box h1{

        font-size:28px;
    }
}
  
/* POPUP */

.popup-overlay{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.5);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;
}

.popup-box{

    width:90%;
    max-width:400px;

    background:white;

    padding:35px 25px;

    border-radius:18px;

    text-align:center;

    animation:popupShow 0.3s ease;
}

.popup-box h2{

    margin-bottom:15px;

    color:#0f172a;
}

.popup-box p{

    color:#555;

    margin-bottom:25px;

    line-height:1.6;
}

.popup-buttons{

    display:flex;

    gap:15px;
}

.popup-buttons button{

    flex:1;
}

.cancel-btn{

    background:#ef4444;
}

.confirm-btn{

    background:#10b981;
}

@keyframes popupShow{

    from{

        transform:scale(0.7);

        opacity:0;
    }

    to{

        transform:scale(1);

        opacity:1;
    }
}
</style>

</head>
<body>

    <!-- BACK BUTTON -->

<a href="/all-items/"
   class="back-btn">

   ← Back

</a>

<div class="form-box">

    <h1>

        Claim Item

    </h1>

    <form method="POST"
      id="claimForm">

    {% csrf_token %}

    <input type="text"
           name="name"
           placeholder="Your Name"
           required>

    <input type="email"
           name="email"
           placeholder="Your Email"
           required>

    <input type="text"
           name="phone"
           placeholder="Phone Number"
           required>

    <textarea name="message"
              rows="5"
              placeholder="Explain why this item belongs to you"
              required></textarea>

    <button type="button"
            onclick="openPopup()">

        Submit Claim

    </button>

</form>

<!-- POPUP -->

<div class="popup-overlay"
     id="popup">

    <div class="popup-box">

        <h2>

            Confirm Claim

        </h2>

        <p>

            Are you sure you want to submit this claim?

        </p>

        <div class="popup-buttons">

            <button class="cancel-btn"
                    onclick="closePopup()">

                Cancel

            </button>

        
            <button class="confirm-btn"
                    onclick="submitForm()">

                Yes Submit

            </button>

        </div>

    </div>

</div>
</div>


<script>

function openPopup(){

    document.getElementById(
        "popup"
    ).style.display = "flex";
}

function closePopup(){

    document.getElementById(
        "popup"
    ).style.display = "none";
}

function submitForm(){

    document.getElementById(
        "claimForm"
    ).submit();
}

</script>


</body>
</html>
