{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Found Item Details</title>

<link rel="stylesheet"
      href="{% static 'css/style.css' %}">

<style>

body{
    background:#f1f5f9;
}

.container{
    width:80%;
    margin:50px auto;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:450px;
    object-fit:contain;
    background:#f8fafc;
}

.content{
    padding:30px;
}

.badge{
    display:inline-block;
    padding:8px 16px;
    background:#10b981;
    color:white;
    border-radius:30px;
    margin-bottom:20px;
}

.content h1{
    margin-bottom:20px;
    color:#0f172a;
}

.content p{
    margin-bottom:15px;
    font-size:18px;
    color:#555;
}

.claim-btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 30px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
}

.claim-btn:hover{
    background:#1d4ed8;
}

/* =========================
   MOBILE RESPONSIVE ONLY
========================= */

@media(max-width:768px){

    body{

        padding:15px;
    }

    /* CONTAINER */

    .container{

        width:100%;

        margin:20px auto;
    }

    /* CARD */

    .card{

        border-radius:14px;
    }

    .card img{

        height:280px;

        object-fit:contain;
    }

    /* CONTENT */

    .content{

        padding:22px;
    }

    .content h1{

        font-size:30px;

        line-height:1.3;

        margin-bottom:18px;
    }

    .content p{

        font-size:16px;

        line-height:1.8;
    }

    /* BADGE */

    .badge{

        font-size:14px;

        padding:8px 14px;
    }

    /* BUTTONS */

    .claim-btn{

        width:100%;

        text-align:center;

        padding:14px 20px;

        font-size:16px;

        margin-top:12px;
    }
}

/* EXTRA SMALL DEVICES */

@media(max-width:480px){

    .card img{

        height:220px;
    }

    .content{

        padding:18px;
    }

    .content h1{

        font-size:24px;
    }

    .content p{

        font-size:14px;
    }

    .claim-btn{

        font-size:15px;
    }
}

</style>

</head>
<body>

<div class="container">

    <div class="card">

        <img src="{{ item.image.url }}">

        <div class="content">

            <span class="badge">
                Found Item
            </span>

            <h1>{{ item.item_name }}</h1>

            <p>
                <strong>Category:</strong>
                {{ item.category }}
            </p>

            <p>
                <strong>Description:</strong>
                {{ item.description }}
            </p>

            <p>
                <strong>Location:</strong>
                {{ item.location }}
            </p>

            <p>
                <strong>Date Found:</strong>
                {{ item.date_found }}
            </p>

            <p>
                <strong>Contact:</strong>
                {{ item.contact }}
            </p>

            <a href="#"
               class="claim-btn">
               Claim Item
            </a>
            <br><br>

<a href="{% url 'edit_found_item' item.id %}"
   class="claim-btn">
   Edit
</a>

<a href="{% url 'delete_found_item' item.id %}"
   class="claim-btn"
   style="background:red;">
   Delete
</a>

        </div>

    </div>

</div>

</body>
</html>
