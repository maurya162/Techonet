{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report Lost Item</title>

<link rel="stylesheet"
      href="{% static 'css/style.css' %}">

<style>

body{
    margin:0;
    padding:0;

    font-family:Arial;

     background:linear-gradient( to right,#f7ecce,#8fd9f7);
}

/* TOP BAR */

.top-bar{
    width:90%;
    margin:30px auto 0;

    display:flex;
    justify-content:flex-end;
}

/* BACK BUTTON */

.back-btn{
    padding:12px 25px;

    background:#2563eb;

    color:white;

    text-decoration:none;

    border-radius:8px;

    font-size:16px;

    font-weight:bold;

    transition:0.3s;
}

.back-btn:hover{
    background:#1d4ed8;

    transform:translateY(-2px);
}

/* FORM CONTAINER */

.form-container{

    width:500px;

    background:white;

    padding:40px;

    margin:20px auto 50px;

    border-radius:18px;

    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* HEADING */

.form-container h2{

    text-align:center;

    margin-bottom:30px;

    color:#0f172a;

    font-size:35px;
}

/* FORM GROUP */

.form-group{
    margin-bottom:20px;
}

/* INPUTS */

.form-group input,
.form-group textarea{

    width:100%;

    padding:14px;

    border:1px solid #cbd5e1;

    border-radius:10px;

    font-size:16px;

    outline:none;

    transition:0.3s;

    box-sizing:border-box;
}

.form-group input:focus,
.form-group textarea:focus{

    border-color:#2563eb;

    box-shadow:0 0 5px rgba(37,99,235,0.3);
}

/* TEXTAREA */

textarea{
    resize:none;
    height:120px;
}

/* FILE INPUT */

input[type="file"]{
    background:#f8fafc;
}

/* BUTTON */

.submit-btn{

    width:100%;

    padding:14px;

    background:#2563eb;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.submit-btn:hover{

    background:#1d4ed8;

    transform:translateY(-2px);
}

/* RESPONSIVE */

@media(max-width:600px){

    .form-container{

        width:90%;

        padding:25px;
    }

    .form-container h2{

        font-size:28px;
    }

}

/* =========================
   MOBILE RESPONSIVE ONLY
========================= */

@media(max-width:768px){

    body{

        padding:15px;
    }

    /* TOP BAR */

    .top-bar{

        width:100%;

        justify-content:center;

        margin:20px auto 10px;
    }

    .back-btn{

        width:180px;

        text-align:center;

        padding:12px 20px;

        font-size:15px;
    }

    /* FORM CONTAINER */

    .form-container{

        width:100%;

        padding:30px 22px;

        margin:20px auto 40px;

        border-radius:16px;

        box-sizing:border-box;
    }

    /* HEADING */

    .form-container h2{

        font-size:30px;

        margin-bottom:24px;

        line-height:1.3;
    }

    /* FORM GROUP */

    .form-group{

        margin-bottom:18px;
    }

    /* INPUTS */

    .form-group input,
    .form-group textarea{

        width:100%;

        padding:14px;

        font-size:15px;

        box-sizing:border-box;
    }

    textarea{

        height:110px;
    }

    /* BUTTON */

    .submit-btn{

        width:100%;

        padding:14px;

        font-size:17px;
    }
}

/* EXTRA SMALL DEVICES */

@media(max-width:480px){

    .form-container{

        padding:25px 18px;
    }

    .form-container h2{

        font-size:26px;
    }

    .form-group input,
    .form-group textarea{

        font-size:14px;
    }

    .submit-btn{

        font-size:16px;
    }

    .back-btn{

        width:100%;
    }
}

</style>

</head>
<body>

<!-- TOP BAR -->

<div class="top-bar">

    <a href="/dashboard/"
       class="back-btn">

        Back

    </a>

</div>

<!-- FORM -->

<div class="form-container">

    <h2>
        Report Lost Item
    </h2>

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-group">

            <input type="text"
                   name="item_name"
                   placeholder="Item Name"
                   required>

        </div>

        <div class="form-group">

            <input type="text"
                   name="category"
                   placeholder="Category"
                   required>

        </div>

        <div class="form-group">

            <textarea name="description"
                      placeholder="Description"
                      required></textarea>

        </div>

        <div class="form-group">

            <input type="text"
                   name="location"
                   placeholder="Lost Location"
                   required>

        </div>

        <div class="form-group">

            <input type="date"
                   name="date_lost"
                   required>

        </div>

        <div class="form-group">

            <input type="text"
                   name="contact"
                   placeholder="Contact Number"
                   required>

        </div>

        <div class="form-group">

            <input type="file"
                   name="image"
                   required>

        </div>

        <button type="submit"
                class="submit-btn">

            Submit

        </button>

    </form>

</div>

</body>
</html>
