{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{

    background:
    linear-gradient(
        rgba(15,23,42,0.60),
        rgba(15,23,42,0.60)
    ),
    url("{% static 'images/login-search.webp' %}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    font-family:Arial;

    margin:0;
    padding:0;

    min-height:100vh;
}

/* TOP BAR */

.top-bar{
    width:90%;
    margin:30px auto 0;

    display:flex;
    justify-content:flex-end;
}

/* BACK BUTTON */

.back-btn{
    padding:12px 25px;

    background:#2563eb;

    color:white;

    text-decoration:none;

    border-radius:8px;

    font-size:16px;

    font-weight:bold;

    transition:0.3s;
}

.back-btn:hover{
    background:#1d4ed8;

    transform:translateY(-2px);
}

/* FORM */

.form-container{

    width:400px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(15px);

    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.20);

    padding:40px;

    margin:30px auto 80px;

    border-radius:18px;

    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.form-container h2{

    text-align:center;

    margin-bottom:25px;

    color:white;

    font-size:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group input{

    width:100%;

    padding:14px;

    background:rgba(255,255,255,0.08) !important;

    border:1px solid rgba(255,255,255,0.25);

    border-radius:10px;

    font-size:16px;

    color:white;

    outline:none;

    box-sizing:border-box;

    backdrop-filter:blur(10px);

    -webkit-backdrop-filter:blur(10px);

    transition:0.3s;
}
.form-group input::placeholder{

    color:rgba(255,255,255,0.75);
}

.form-group input:focus{

    background:rgba(255,255,255,0.12);

    border-color:#38bdf8;

    box-shadow:0 0 10px rgba(56,189,248,0.4);
}

.role-select{

    width:100%;

    padding:14px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.25);

    border-radius:10px;

    color:white;

    font-size:16px;

    backdrop-filter:blur(10px);
}

.role-select option{
    color:black;
}

/* BUTTON */

.submit-btn{

    width:100%;

    padding:14px;

    background:#10b981;

    color:white;

    border:none;

    border-radius:8px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.submit-btn:hover{

    background:#059669;

    transform:translateY(-2px);
}

/* ERROR */

.error{

    color:red;

    text-align:center;

    margin-bottom:15px;
}

/* LINK */

.link{

    text-align:center;

    margin-top:20px;

    font-size:16px;
}

.link a{

    text-decoration:none;

    color:#2563eb;

    font-weight:bold;
}

.link a:hover{
    text-decoration:underline;
}

/* ROLE SELECT */

.role-select{

    width:100%;

    padding:14px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

    outline:none;

    transition:0.3s;
}

.role-select:focus{

    border-color:#10b981;

    box-shadow:0 0 5px rgba(16,185,129,0.3);
}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:768px){

    body{

        padding:15px;

        display:flex;

        flex-direction:column;

        align-items:center;
    }

    /* TOP BAR */

    .top-bar{

        width:100%;

        margin:15px 0;

        display:flex;

        justify-content:center;
    }

    .back-btn{

        width:160px;

        text-align:center;

        padding:12px 18px;

        font-size:15px;
    }

    /* FORM CONTAINER */

    .form-container{

        width:100%;

        max-width:420px;

        padding:30px 22px;

        margin:10px auto 40px;

        border-radius:16px;

        box-sizing:border-box;
    }

    /* HEADING */

    .form-container h2{

        font-size:30px;

        margin-bottom:22px;
    }

    /* FORM GROUP */

    .form-group{

        margin-bottom:18px;
    }

    /* INPUTS */

    .form-group input,
    .role-select{

        width:100%;

        padding:14px;

        font-size:15px;
    }

    /* BUTTON */

    .submit-btn{

        width:100%;

        padding:14px;

        font-size:17px;
    }

    /* LINK */

    .link{

        font-size:15px;

        line-height:1.6;
    }
}

/* EXTRA SMALL DEVICES */

@media(max-width:480px){

    body{

        padding:12px;
    }

    .form-container{

        padding:25px 18px;
    }

    .form-container h2{

        font-size:26px;
    }

    .form-group input,
    .role-select{

        font-size:14px;

        padding:13px;
    }

    .submit-btn{

        font-size:16px;
    }

    .back-btn{

        width:140px;

        font-size:14px;
    }

    .link{

        font-size:14px;
    }
}

</style>

</head>
<body>



<div class="top-bar">

    <a href="/"
       class="back-btn">

        Back

    </a>

</div>



<div class="form-container">

    <h2>Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

        </div>

        <div class="form-group">

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

        </div>
        <div class="form-group">

    <select name="role"
            required
            class="role-select">

        <option value="">
            Select Role
        </option>

        <option value="user">
            User
        </option>

        <option value="admin">
            Admin
        </option>

    </select>

</div>

        <button type="submit"
                class="submit-btn">

            Login

        </button>

    </form>

    <div class="link">

        Don't have account?

        <a href="{% url 'register' %}">
            Register
        </a>

    </div>

</div>

</body>
</html>
